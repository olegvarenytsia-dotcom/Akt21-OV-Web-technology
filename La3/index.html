
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab3 Галерея — Варіант 6</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Моя фотогалерея</h1>
    </header>

    <main>
        <!-- Головний Flexbox контейнер для 6 карток відповідно до варіанта -->
        <div class="gallery">

            <div class="card">
                <img src="https://picsum.photos/seed/picsum/200/300" alt="Гірські вершини">
                <p>Фото 1 — Гори</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos" alt="Морський захід">
                <p>Фото 2 — Море</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos" alt="Лісова стежка">
                <p>Фото 3 — Ліс</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos" alt="Піщані дюни">
                <p>Фото 4 — Пустеля</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos" alt="Гірське озеро">
                <p>Фото 5 — Озеро</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos" alt="Тропічний ліс">
                <p>Фото 6 — Тропіки</p>
            </div>

        </div>
    </main>

</body>
</html>
