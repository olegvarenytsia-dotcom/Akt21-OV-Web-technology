<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт-візитка</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>

        <h1>Олег Варениця</h1>

        <p>Студент та майбутній веб-розробник</p>

    </header>

    <!-- Navigation -->
    <nav>

        <a href="#about">Про себе</a>

        <a href="#skills">Навички</a>

        <a href="#contacts">Контакти</a>

    </nav>

    <!-- Main -->
    <main>

        <!-- About -->
        <section id="about">

            <h2>Про себе</h2>

            <p>
                Мене звати Олег. Я навчаюся веб-технологіям та
                цікавлюсь створенням сучасних сайтів.
            </p>

        </section>

        <!-- Skills -->
        <section id="skills">

            <h2>Навички</h2>

            <ul>

                <li>HTML</li>

                <li>CSS</li>

                <li>JavaScript</li>

            </ul>

        </section>

        <!-- Portfolio -->
        <section id="portfolio">

            <h2>Портфоліо</h2>

            <img src="https://picsum.photos/300/200" alt="Фото">

            <p>
                Приклад мого майбутнього проєкту.
            </p>

        </section>

        <!-- Contacts -->
        <section id="contacts">

            <h2>Контакти</h2>

            <form id="contactForm">

                <input type="text" id="name" placeholder="Ваше ім'я">

                <input type="email" id="email" placeholder="Ваш Email">

                <textarea id="message" placeholder="Ваше повідомлення"></textarea>

                <button type="submit">
                    Надіслати
                </button>

            </form>

        </section>

    </main>

    <!-- Footer -->
    <footer>

        <p>
            © 2025 Олег Варениця
        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
